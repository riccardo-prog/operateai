<!-- OperateAI Animated Hero Graphic — place in your public/ folder or embed in Hero.tsx -->
<!-- This is a standalone animated SVG with orbiting nodes, pulsing glows, and flowing paths -->
<!-- It suggests systems in motion — automation working silently in the background -->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Glow filters -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60" result="blur"/>
    </filter>
    <filter id="nodeGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Gradient for arcs -->
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#38BDF8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="arcGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#818CF8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>

    <!-- Radial glow for background atmosphere -->
    <radialGradient id="bgGlow1" cx="65%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="bgGlow2" cx="30%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background atmosphere -->
  <rect width="800" height="600" fill="transparent"/>
  <rect width="800" height="600" fill="url(#bgGlow1)"/>
  <rect width="800" height="600" fill="url(#bgGlow2)"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- ORBITAL SYSTEM — centered at (420, 280) -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Outer orbit ring — slow rotation -->
  <g transform="translate(420, 280)">
    <circle r="220" fill="none" stroke="#38BDF8" stroke-opacity="0.06" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="120s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Middle orbit ring — medium rotation -->
  <g transform="translate(420, 280)">
    <circle r="150" fill="none" stroke="#38BDF8" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="8 12">
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="80s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Inner orbit ring -->
  <g transform="translate(420, 280)">
    <circle r="80" fill="none" stroke="#818CF8" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="4 8">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="50s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ═══════════════════════════ -->
  <!-- ORBITING NODES             -->
  <!-- ═══════════════════════════ -->

  <!-- Node 1 — outer orbit, accent blue, slow -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 420 280" to="360 420 280" dur="25s" repeatCount="indefinite"/>
    <!-- Glow -->
    <circle cx="640" cy="280" r="12" fill="#38BDF8" opacity="0.15" filter="url(#nodeGlow)">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Core -->
    <circle cx="640" cy="280" r="4" fill="#38BDF8" opacity="0.9">
      <animate attributeName="r" values="3.5;5;3.5" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 2 — outer orbit, offset start, indigo -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="140 420 280" to="500 420 280" dur="30s" repeatCount="indefinite"/>
    <circle cx="640" cy="280" r="10" fill="#818CF8" opacity="0.12" filter="url(#nodeGlow)">
      <animate attributeName="opacity" values="0.08;0.2;0.08" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="640" cy="280" r="3" fill="#818CF8" opacity="0.8">
      <animate attributeName="r" values="2.5;4;2.5" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 3 — middle orbit, faster -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="60 420 280" to="420 420 280" dur="18s" repeatCount="indefinite"/>
    <circle cx="570" cy="280" r="10" fill="#38BDF8" opacity="0.12" filter="url(#nodeGlow)">
      <animate attributeName="opacity" values="0.08;0.22;0.08" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="570" cy="280" r="3.5" fill="#38BDF8" opacity="0.85">
      <animate attributeName="r" values="3;4.5;3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 4 — middle orbit, opposite side -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="220 420 280" to="580 420 280" dur="22s" repeatCount="indefinite"/>
    <circle cx="570" cy="280" r="8" fill="#818CF8" opacity="0.1" filter="url(#nodeGlow)">
      <animate attributeName="opacity" values="0.06;0.18;0.06" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="570" cy="280" r="2.5" fill="#818CF8" opacity="0.75">
      <animate attributeName="r" values="2;3.5;2" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 5 — inner orbit, bright -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 420 280" to="360 420 280" dur="12s" repeatCount="indefinite"/>
    <circle cx="500" cy="280" r="14" fill="#38BDF8" opacity="0.1" filter="url(#nodeGlow)">
      <animate attributeName="opacity" values="0.08;0.2;0.08" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="280" r="3" fill="#38BDF8" opacity="0.95">
      <animate attributeName="r" values="2.5;4;2.5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ═══════════════════════════ -->
  <!-- CENTER HUB                 -->
  <!-- ═══════════════════════════ -->

  <!-- Outer pulse ring -->
  <circle cx="420" cy="280" r="20" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0">
    <animate attributeName="r" values="15;40;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.08;0" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Second pulse ring, offset timing -->
  <circle cx="420" cy="280" r="15" fill="none" stroke="#818CF8" stroke-width="1" opacity="0">
    <animate attributeName="r" values="15;35;35" dur="4s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.05;0" dur="4s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Hub glow -->
  <circle cx="420" cy="280" r="25" fill="#38BDF8" opacity="0.08" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.06;0.12;0.06" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Hub core -->
  <circle cx="420" cy="280" r="6" fill="#38BDF8" opacity="0.9">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="280" r="3" fill="#F1F5F9" opacity="0.95"/>

  <!-- ═══════════════════════════════════ -->
  <!-- FLOWING CONNECTION LINES            -->
  <!-- Suggests data flowing between nodes -->
  <!-- ═══════════════════════════════════ -->

  <!-- Arc path 1 — sweeping curve top -->
  <path d="M 150 180 Q 350 80 550 160" fill="none" stroke="url(#arcGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
    <animate attributeName="stroke-dashoffset" from="400" to="0" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" dur="8s" repeatCount="indefinite"/>
  </path>

  <!-- Arc path 2 — bottom sweep -->
  <path d="M 250 450 Q 420 520 650 420" fill="none" stroke="url(#arcGrad2)" stroke-width="1" stroke-linecap="round" stroke-dasharray="120 280" opacity="0.3">
    <animate attributeName="stroke-dashoffset" from="400" to="0" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.3;0.3;0" dur="10s" repeatCount="indefinite"/>
  </path>

  <!-- Thin data stream lines -->
  <line x1="180" y1="320" x2="350" y2="290" stroke="#38BDF8" stroke-width="0.5" stroke-dasharray="3 6" opacity="0">
    <animate attributeName="opacity" values="0;0.2;0.2;0" dur="6s" begin="1s" repeatCount="indefinite"/>
  </line>

  <line x1="490" y1="270" x2="680" y2="200" stroke="#818CF8" stroke-width="0.5" stroke-dasharray="3 6" opacity="0">
    <animate attributeName="opacity" values="0;0.15;0.15;0" dur="7s" begin="3s" repeatCount="indefinite"/>
  </line>

  <!-- ═══════════════════════ -->
  <!-- AMBIENT PARTICLES       -->
  <!-- ═══════════════════════ -->

  <circle cx="120" cy="150" r="1.5" fill="#38BDF8" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="5s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="120" r="1" fill="#818CF8" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0" dur="6s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="480" r="1.5" fill="#38BDF8" opacity="0">
    <animate attributeName="opacity" values="0;0.35;0" dur="4s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="450" r="1" fill="#818CF8" opacity="0">
    <animate attributeName="opacity" values="0;0.25;0" dur="7s" begin="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="520" r="1" fill="#38BDF8" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0" dur="5.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="100" r="1.5" fill="#38BDF8" opacity="0">
    <animate attributeName="opacity" values="0;0.2;0" dur="8s" begin="4s" repeatCount="indefinite"/>
  </circle>

</svg>
